version: '3.8'

services:
  # ============================================
  # Frontend Next.js
  # ============================================
  front:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: osint_front
    restart: unless-stopped
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_DATABASE: osint_sinistres
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_PORT: 5432
      POSTGRES_SSL: 'false'
    ports:
      - "3000:3000"
    networks:
      - osint_network
    depends_on:
      postgres:
        condition: service_healthy

  # ============================================
  # PostgreSQL
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: osint_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: osint_sinistres # Ta base principale
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - osint_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d osint_sinistres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # n8n
  # ============================================
  n8n:
    image: n8nio/n8n:latest
    container_name: osint_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n_data  # <--- CHANGÉ : n8n aura son propre espace
      - DB_POSTGRESDB_USER=admin
      - DB_POSTGRESDB_PASSWORD=admin
      - N8N_ENCRYPTION_KEY=votre_cle_secrete_ici # <--- AJOUTÉ : Important pour la sécurité
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=false
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - osint_network
    depends_on:
      postgres:
        condition: service_healthy

  # ============================================
  # pgAdmin
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: osint_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@osint.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False' # Optionnel : simplifie l'usage local
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - osint_network
    depends_on:
      - postgres

volumes:
  postgres_data:
  pgadmin_data:
  n8n_data:

networks:
  osint_network:
    driver: bridge