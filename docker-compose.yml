version: '3.8'

services:
  # ============================================
  # PostgreSQL - Base de données
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: osint_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: osint_sinistres
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - osint_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d osint_sinistres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # n8n - Automatisation (Optimisé Mac Studio)
  # ============================================
  n8n:
    image: n8nio/n8n:latest
    container_name: osint_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=osint_sinistres
      - DB_POSTGRESDB_USER=admin
      - DB_POSTGRESDB_PASSWORD=admin
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      # Supprime la ligne ci-dessous si tu n'utilises pas de tunnel/nom de domaine
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - osint_network
    depends_on:
      postgres:
        condition: service_healthy

  # ============================================
  # pgAdmin - Interface d'administration
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: osint_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@osint.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - osint_network
    depends_on:
      - postgres

# ============================================
# Volumes persistants
# ============================================
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
  n8n_data:
    driver: local

# ============================================
# Réseau interne
# ============================================
networks:
  osint_network:
    driver: bridge