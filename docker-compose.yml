version: '3.8'

services:

  # ============================================
  # PostgreSQL - Base de données
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: osint_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: osint_sinistres
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - osint_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d osint_sinistres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # pgAdmin - Interface d'administration Postgres
  # ============================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: osint_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@osint.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - osint_network
    depends_on:
      - postgres

# ============================================
# Volumes persistants
# ============================================
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

# ============================================
# Réseau interne
# ============================================
networks:
  osint_network:
    driver: bridge
